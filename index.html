                    <script>
                        const video = document.getElementById('video1');

                        const isSafari =/^((?!chrome|android).)*safari/i.test(navigator.userAgent);

                            if (isSafari) {
                                video.innerHTML = '<source src="img/Demo Moodle.mov" type=\'video/mp4; codecs="hvc1"\'>';
                                console.log("To jest Mov");
                            } else {
                                video.innerHTML = '<source src="img/Demo Moodle.webm" type="video/webm">';
                                console.log("To jest webm");
                                    }
                            video.load();
                    </script>
